data:
  path: '../dataset_v3/'
  heterogeneous: false

model:
  type: unet3d
  in_channels: 6    # 4 state + 1 rate + 1 mask
  out_channels: 4
  hidden_channels: 64
  depth: 4
  channel_multipliers: [1, 2, 4, 4, 8]

training:
  local:
    batch_size: 1
    lr: 3.0e-4
    num_epochs: 1000
    test_batch_size: 1
  hpc:
    batch_size: 4
    lr: 5.0e-4
    num_epochs: 2000
    test_batch_size: 4
  weight_decay: 1.0e-4
  ema_decay: 0.9995
  log_every: 20
  grad_clip_norm: 1.0
  noise_alpha: [0.0025, 0.0025, 0.025, 0.025]
  use_pushforward: true
  pushforward_k_max: 10
  pushforward_k_step_interval: 5000
  warmup_steps: 4500
  min_lr: 3.0e-4
  epochs_per_run: 500

loss:
  use_mse: true
  mse_weight: 3.0
  use_h1: true
  h1_weight: 1.0
  use_mbe: true
  mbe_weight: 2.0
  use_spectral: true
  spectral_weight: 3.0
  spectral_iLow: 2
  spectral_iHigh: 10
  channel_weights: [1.0, 1.0, 1.0, 1.0]

logging:
  writer: true
  wandb_project: "homogeneous"
  wandb_entity: null
  watch_model: false
  log_scalar_every: 10

checkpoints:
  running_dir: "checkpoints/running/"
  final_path: "checkpoints/unet_homo_final.pth"
  resume_path: "checkpoints/running/unet_homo_resume.pt"
