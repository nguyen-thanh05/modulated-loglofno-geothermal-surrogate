data:
  path: '../dataset_v3_hetero/'
  heterogeneous: true

model:
  type: modulated_loglo
  in_dim: 8          # 4 state + 4 static (por_m, por_f, perm_m, perm_f); modulation encoder sees action + static only
  out_dim: 4
  lifting_dim: 256
  projection_dim: 256
  hidden_dim: 64
  n_blocks: 5
  action_channels: 6  # rate + mask + 4 static

training:
  local:
    batch_size: 1
    lr: 3.0e-4
    num_epochs: 1000
    test_batch_size: 1
  hpc:
    batch_size: 4
    lr: 8.0e-4
    num_epochs: 2000
    test_batch_size: 4
  weight_decay: 1.0e-4
  ema_decay: 0.9995
  log_every: 20
  grad_clip_norm: 1.0
  noise_alpha: [0.0025, 0.0025, 0.025, 0.025]
  use_pushforward: true
  pushforward_k_max: 10
  pushforward_k_step_interval: 5000
  warmup_steps: 4500
  min_lr: 3.0e-4
  epochs_per_run: 500

loss:
  use_mse: true
  mse_weight: 3.0
  use_h1: true
  h1_weight: 1.0
  use_mbe: false
  mbe_weight: 2.0
  use_spectral: true
  spectral_weight: 3.0
  spectral_iLow: 2
  spectral_iHigh: 10
  channel_weights: [1.0, 1.0, 1.0, 1.0]

logging:
  writer: true
  wandb_project: "MODULATED_LOGLOFNO_HETERO_loss_ablation"
  wandb_entity: null
  watch_model: false
  log_scalar_every: 10
  run_tag: "-no_mbe"

checkpoints:
  running_dir: "checkpoints/running/"
  final_path: "checkpoints/modulated_loglo_hetero_no_mbe_final.pth"
  resume_path: "checkpoints/running/modulated_loglo_hetero_no_mbe_resume.pt"
