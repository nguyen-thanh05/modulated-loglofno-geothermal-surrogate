data:
  path: '../dataset_v3_hetero/'
  heterogeneous: true

model:
  type: fno
  n_modes: [4, 16, 8]
  n_layers: 5
  hidden_channels: 64
  in_channels: 10   # 4 state + 4 static + 1 rate + 1 mask
  out_channels: 4
  aux_channels: 16

training:
  local:
    batch_size: 1
    lr: 3.0e-4
    num_epochs: 1000
    test_batch_size: 1
  hpc:
    batch_size: 4
    lr: 8.0e-4
    num_epochs: 3000
    test_batch_size: 4
  weight_decay: 1.0e-4
  ema_decay: 0.9995
  log_every: 20
  grad_clip_norm: 1.0
  noise_alpha: [0.0025, 0.0025, 0.025, 0.025]
  use_pushforward: true
  pushforward_k_max: 10
  pushforward_k_step_interval: 5000
  warmup_steps: 4500
  min_lr: 3.0e-4
  epochs_per_run: 1000

loss:
  use_mse: true
  mse_weight: 3.0
  use_h1: true
  h1_weight: 0.5
  use_aux: true
  aux_weight: 0.1
  use_mbe: true
  mbe_weight: 1.0
  use_spectral: true
  spectral_weight: 3.0
  spectral_iLow: 4
  spectral_iHigh: 12
  use_meanfield: true
  meanfield_weight: 2.0
  channel_weights: [1.0, 1.0, 2.0, 2.0]

logging:
  writer: true
  wandb_project: "LOGLOFNO_HETERO_exp"
  wandb_entity: null
  watch_model: false
  log_scalar_every: 10

checkpoints:
  running_dir: "checkpoints/running/"
  final_path: "checkpoints/fno_m4x16x8_h64_hetero_final.pth"
  resume_path: "checkpoints/running/fno_m4x16x8_h64_hetero_resume.pt"
